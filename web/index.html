<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игровой Портал</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🎮 Игровой Портал</h1>
            <div id="user-info"></div>
        </header>
        
        <main>
            <section id="games-list">
                <h2>Доступные игры</h2>
                <div class="games-grid">
                    <div class="game-card" data-game="chess">
                        <h3>♟️ Шахматы</h3>
                        <p>Классическая стратегическая игра</p>
                        <button onclick="startGame('chess')">Начать игру</button>
                    </div>
                    <div class="game-card" data-game="checkers">
                        <h3>🔴 Шашки</h3>
                        <p>Традиционная настольная игра</p>
                        <button onclick="startGame('checkers')">Начать игру</button>
                    </div>
                    <div class="game-card" data-game="backgammon">
                        <h3>🎲 Нарды</h3>
                        <p>Игра в кости и стратегию</p>
                        <button onclick="startGame('backgammon')">Начать игру</button>
                    </div>
                </div>
            </section>
            
            <section id="tournaments">
                <h2>Текущие турниры</h2>
                <div id="tournaments-list"></div>
            </section>
            
            <section id="leaderboard">
                <h2>Лидерборд</h2>
                <div id="leaderboard-content"></div>
            </section>
        </main>
    </div>
    
    <script src="/static/portal.js"></script>
</body>
</html>
