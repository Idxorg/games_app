server:
  port: 8000
  host: "0.0.0.0"
  mode: "release"  # debug | release | test

database:
  url: "postgresql://game:CHANGE_ME@localhost:5432/game_platform?sslmode=disable"
  pool_size: 10

redis:
  url: "localhost:6379"
  password: ""
  db: 0

s3:
  endpoint: "https://s3.example.com"
  access_key: "YOUR_S3_ACCESS_KEY"
  secret_key: "YOUR_S3_SECRET_KEY"
  bucket: "your-bucket"
  region: "us-east-1"

portal_api:
  url: "https://portal.example.com/api"
  api_key: "YOUR_PORTAL_API_KEY"
  timeout: 10

jwt:
  secret: "CHANGE_ME_TO_A_RANDOM_SECRET"
  jwks_url: "https://portal.example.com/.well-known/jwks.json"
  issuer: "game-platform"

livekit:
  host: "https://livekit.example.com"
  api_key: "YOUR_LIVEKIT_API_KEY"
  api_secret: "YOUR_LIVEKIT_API_SECRET"

cors:
  allowed_origins:
    - "http://localhost:8000"
    - "http://localhost:3000"
